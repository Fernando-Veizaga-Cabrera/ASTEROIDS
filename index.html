<!DOCTYPE html>
<html>
    <head>
        <title>ASTEROIDS</title>
        <link rel="stylesheet" href="style.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <div class="header">
            <h1 class="header_title">
                ASTEROIDS
            </h1>
            <p class="header_score">
                PUNTUACION : <span class="header_rate"> 0 </span>
            </p>
        </div>
        <svg class="world" width="1200" height="600">
            <g class="meteorite">
                <circle cx="100" cy="100" r="45">
                </circle> 
                <polygon points="100,60 140,80 130,130 90,140 60,110 70,70">
                </polygon>
            </g>
            <g class="spaceship">
                <polygon points="600,300 610,330 590,330">
                </polygon>
            </g>
            <g class="bullet">
                <circle class="bullet_hidden" cx="0" cy="0" r="2">
                </circle>
            </g>
        </svg>
        <script src="script.js"></script>
    </body>
</html>
